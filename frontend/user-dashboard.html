<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WasteAI - User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>Waste<span>AI</span></h2>
            </div>
            
            <nav class="nav-menu">
                <a href="user-dashboard.html" class="active">Dashboard</a>
                <a href="feedback.html">Give Feedback</a>
                <a href="support.html">Help & Support</a>
                <a href="index.html" class="logout-link">Logout</a>
            </nav>

            <div class="add-food-card" style="margin-top: 2rem;">
                <h3>Add New Item</h3>
                <form id="foodForm">
                    <div class="form-group">
                        <label for="name">Food Name</label>
                        <input type="text" id="name" required placeholder="e.g. Tomatoes" autocomplete="off">
                    </div>
                    <div class="form-group">
                        <label for="quantity">Quantity (kg/units)</label>
                        <input type="number" id="quantity" required placeholder="e.g. 5" min="1">
                    </div>
                    <div class="form-group">
                        <label for="days">Storage Days</label>
                        <input type="number" id="days" required placeholder="Days in storage" min="0">
                    </div>
                    <div class="form-group">
                        <label for="storage">Storage Type</label>
                        <select id="storage" required>
                            <option value="Room">Room Temp</option>
                            <option value="Fridge">Fridge</option>
                        </select>
                    </div>
                    <button type="submit" class="btn primary-btn">Analyze & Add</button>
                </form>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header>
                <h1>User Dashboard</h1>
                <p class="subtitle">Welcome back! Manage your food inventory below.</p>
                
                <div class="stats-grid" style="margin-top: 1.5rem;">
                    <div class="stat-card">
                        <p class="label">Total Items</p>
                        <h2 id="totalItems">0</h2>
                    </div>
                    <div class="stat-card warning-stat">
                        <p class="label">Expiring Soon</p>
                        <h2 id="expiringItems">0</h2>
                    </div>
                </div>
            </header>

            <div class="content-split" style="grid-template-columns: 1fr;">
                <!-- Food List -->
                <section class="food-list-container glass-panel">
                    <h3>Your Inventory</h3>
                    <div class="table-responsive">
                        <table id="foodTable">
                            <thead>
                                <tr>
                                    <th>Food Item</th>
                                    <th>Qty</th>
                                    <th>Days</th>
                                    <th>Storage</th>
                                    <th>Status</th>
                                    <!-- Users cannot donate, Admin does -->
                                </tr>
                            </thead>
                            <tbody id="foodTableBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script>const IS_ADMIN = false;</script>
    <script src="app.js"></script>
</body>
</html>
